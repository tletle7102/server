<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>matchhub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 560px; width: 100%; }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .tagline { color: #94a3b8; font-size: 1rem; margin-bottom: 2.5rem; }
    .services { display: grid; gap: 0.75rem; }
    .service {
      display: flex; justify-content: space-between;
      padding: 1rem 1.25rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      text-decoration: none;
      color: #e2e8f0;
    }
    .service:hover { background: #283548; }
  </style>
</head>
<body>
  <div class="container">
    <h1>matchhub</h1>
    <p class="tagline">자가 호스팅 서비스 모음</p>
    <div class="services">
      <a href="/" class="service">sampleapp — 서브도메인으로 접속</a>
      <a href="/" class="service">jenkins — 서브도메인으로 접속</a>
    </div>
  </div>
</body>
</html>
